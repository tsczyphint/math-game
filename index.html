<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 數學冒險王 Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800;900&display=swap');
:root{--bg:#07050f;--card:#12102a;--card2:#1a1840;--accent:#818cf8;--gold:#fbbf24;--text:#f0edff;--sub:#7c78a8;--border:rgba(129,140,248,0.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 22% 55%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 45% 28%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 65% 75%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 80% 18%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 58% 8%,rgba(180,160,255,.9) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 12% 82%,rgba(180,160,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 75% 35%,rgba(255,255,255,.6) 0%,transparent 100%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:16px 14px 80px}
.header{text-align:center;padding:16px 0 6px}
.title{font-family:'Baloo 2',cursive;font-size:clamp(1.8rem,7vw,3rem);font-weight:900;background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:4px}
.subtitle{color:var(--sub);font-size:.85rem}
.scorebar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:10px 16px;margin:12px 0;gap:6px;flex-wrap:wrap}
.si{text-align:center;flex:1;min-width:50px}
.si .v{font-family:'Baloo 2',cursive;font-size:1.45rem;font-weight:800;color:var(--gold);line-height:1}
.si .l{font-size:.6rem;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.diff-section{margin:12px 0}
.diff-section h3{font-size:.75rem;color:var(--sub);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
.diff-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.db{padding:8px 4px;border:2px solid transparent;border-radius:11px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:900;cursor:pointer;transition:all .2s;background:var(--card2);color:var(--sub);line-height:1.3}
.db span{display:block;font-size:.62rem;font-weight:600;margin-top:1px;opacity:.7}
.db.easy{border-color:#22d3ee30}.db.medium{border-color:#fb923c30}.db.hard{border-color:#f43f5e30}.db.hell{border-color:#a855f730}
.db.easy.on{background:#22d3ee18;border-color:#22d3ee;color:#22d3ee;box-shadow:0 0 16px #22d3ee30}
.db.medium.on{background:#fb923c18;border-color:#fb923c;color:#fb923c;box-shadow:0 0 16px #fb923c30}
.db.hard.on{background:#f43f5e18;border-color:#f43f5e;color:#f43f5e;box-shadow:0 0 16px #f43f5e30}
.db.hell.on{background:#a855f718;border-color:#a855f7;color:#a855f7;box-shadow:0 0 16px #a855f730}
.type-tabs{display:flex;gap:6px;margin:12px 0;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.type-tabs::-webkit-scrollbar{display:none}
.tt{flex-shrink:0;padding:7px 13px;border-radius:20px;border:1.5px solid rgba(129,140,248,.2);background:var(--card);color:var(--sub);font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap}
.tt.on{background:linear-gradient(135deg,#6d28d9,#4338ca);border-color:transparent;color:#fff;box-shadow:0 4px 14px #6d28d960}
.progress-wrap{margin:6px 0 10px}
.pdots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .25s}
.dot.ok{background:#22d3ee}.dot.no{background:#f43f5e}.dot.tm{background:#6b7280}
.dot.cur{background:var(--accent);transform:scale(1.5);box-shadow:0 0 6px var(--accent)}
.plabel{font-size:.68rem;color:var(--sub);text-align:center;margin-top:5px}
.qcard{background:linear-gradient(145deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:22px;padding:20px 18px;margin:0 0 10px;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;overflow:hidden}
.twrap{width:100%;display:flex;align-items:center;gap:8px}
.tbar-bg{flex:1;background:rgba(255,255,255,.07);border-radius:8px;height:7px;overflow:hidden}
.tbar{height:7px;border-radius:8px;background:linear-gradient(90deg,#818cf8,#38bdf8);transition:width .25s linear;width:100%}
.tbar.warn{background:linear-gradient(90deg,#fb923c,#f43f5e);animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.6}}
.tnum{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:800;color:var(--gold);min-width:26px;text-align:right}
.qlabel{font-size:.72rem;color:var(--sub);text-transform:uppercase;letter-spacing:1.2px}
.qtext{font-family:'Baloo 2',cursive;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:800;text-align:center;color:#fff;line-height:1.3;width:100%}
.seq-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.sc{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;background:rgba(129,140,248,.1);border:2px solid rgba(129,140,248,.22);color:#fff;font-family:'Baloo 2',cursive}
.sc.blank{background:rgba(129,140,248,.04);border:2.5px dashed rgba(129,140,248,.55);color:var(--accent);font-size:1.4rem}
.sarr{color:var(--sub);font-size:.85rem;flex-shrink:0}
.shape-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.shc{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:1.55rem;border-radius:11px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.09)}
.shc.blank{border:2.5px dashed var(--accent);background:rgba(129,140,248,.08);color:var(--accent)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:4px}
.cb{padding:12px 8px;border-radius:13px;border:2px solid rgba(129,140,248,.2);background:var(--card2);color:#fff;font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.cb:hover:not(:disabled){border-color:var(--accent);background:rgba(129,140,248,.18);transform:translateY(-2px)}
.cb.ok{background:#14532d33;border-color:#22d3ee;color:#22d3ee;animation:pop .3s ease}
.cb.no{background:#7f1d1d33;border-color:#f43f5e;color:#f43f5e;animation:shake .3s ease}
.cb:disabled{cursor:default}.cb.sm{font-size:.85rem;font-family:'Nunito',sans-serif;font-weight:800;line-height:1.4}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}100%{transform:translateX(0)}}
.fb{text-align:center;font-size:.95rem;font-weight:800;padding:8px 12px;border-radius:12px;min-height:40px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.fb.ok{background:#14532d22;color:#4ade80}.fb.no{background:#7f1d1d22;color:#f87171}.fb.tm{background:#1f293722;color:#94a3b8}
.controls{display:flex;gap:9px;margin-top:9px}
.btn{flex:1;padding:12px;border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:.93rem;font-weight:900;cursor:pointer;transition:all .2s}
.primary{background:linear-gradient(135deg,#6d28d9,#4338ca);color:#fff;box-shadow:0 4px 16px rgba(109,40,217,.45)}
.primary:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(109,40,217,.65)}
.secondary{background:var(--card2);color:var(--sub);border:1.5px solid var(--border)}
.result{display:none;text-align:center;padding:26px 18px;background:linear-gradient(145deg,var(--card),var(--card2));border-radius:22px;border:1px solid rgba(129,140,248,.25);margin:12px 0}
.result.show{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.remoji{font-size:3.2rem;margin-bottom:6px}
.rtitle{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:900;margin-bottom:5px;background:linear-gradient(135deg,#c084fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rgrade{font-family:'Baloo 2',cursive;font-size:2.8rem;font-weight:900;color:var(--gold);margin:6px 0}
.rsub{color:var(--sub);font-size:.88rem;margin-bottom:14px}
.rstats{display:flex;justify-content:center;gap:12px;margin:12px 0;flex-wrap:wrap}
.sbox{background:rgba(255,255,255,.05);border-radius:11px;padding:10px 14px;min-width:80px}
.sbox .n{font-family:'Baloo 2',cursive;font-size:1.6rem;color:var(--gold)}
.sbox .t{font-size:.68rem;color:var(--sub)}
.bdown{margin:14px 0;text-align:left;background:rgba(129,140,248,.07);border-radius:13px;padding:12px 14px}
.bdown h4{font-size:.72rem;color:var(--sub);margin-bottom:9px;text-transform:uppercase;letter-spacing:1px}
.brow{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:.83rem}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bbg{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.bbar{height:5px;border-radius:3px}
.streak-badge{display:none;position:fixed;top:16px;right:16px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;font-weight:900;padding:7px 15px;border-radius:20px;font-size:.85rem;z-index:100;box-shadow:0 4px 14px rgba(251,191,36,.5);animation:badgePop .4s ease}
@keyframes badgePop{0%{transform:scale(0) rotate(-10deg)}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
.visual-q-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
.visual-q-svg{display:flex;justify-content:center;align-items:center;width:100%;overflow-x:auto}
.visual-q-svg svg{max-width:100%;max-height:220px}
.visual-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:4px}
.vcb{padding:8px 6px;border-radius:14px;border:2px solid rgba(129,140,248,.25);background:var(--card2);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.vcb:hover:not(:disabled){border-color:var(--accent);background:rgba(129,140,248,.18);transform:translateY(-2px)}
.vcb svg{max-width:160px;max-height:150px;width:auto;height:auto}
.vcb.ok{background:#14532d33;border-color:#22d3ee;animation:pop .3s ease}
.vcb.no{background:#7f1d1d33;border-color:#f43f5e;animation:shake .3s ease}
.vcb:disabled{cursor:default}
.vcb-label{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;color:var(--sub)}
.vcb.ok .vcb-label{color:#22d3ee}.vcb.no .vcb-label{color:#f43f5e}
</style>
</head>
<body>
<div id="badge" class="streak-badge">🔥</div>
<div class="wrap">
  <div class="header"><div class="title">🧠 數學冒險王 Pro</div><div class="subtitle">20題挑戰 · 5種模式 · 4種難度 · 每題60秒</div></div>
  <div class="scorebar">
    <div class="si"><div class="v" id="vScore">0</div><div class="l">🏆 分數</div></div>
    <div class="si"><div class="v" id="vStreak">0</div><div class="l">🔥 連勝</div></div>
    <div class="si"><div class="v" id="vCorrect">0</div><div class="l">✅ 答對</div></div>
    <div class="si"><div class="v" id="vProg">-/20</div><div class="l">📝 進度</div></div>
  </div>
  <div class="diff-section"><h3>選擇難度</h3>
    <div class="diff-btns">
      <button class="db easy on" onclick="setDiff('easy',this)">🌱 簡單</button>
      <button class="db medium" onclick="setDiff('medium',this)">⚡ 中等</button>
      <button class="db hard" onclick="setDiff('hard',this)">🔥 困難</button>
      <button class="db hell" onclick="setDiff('hell',this)">💀 地獄</button>
    </div>
  </div>
  <div class="type-tabs">
    <div class="tt on" onclick="setType('mix',this)">🎲 混合模式</div>
    <div class="tt" onclick="setType('math',this)">🔢 數列規律</div>
    <div class="tt" onclick="setType('calc',this)">➕ 四則運算</div>
    <div class="tt" onclick="setType('shape',this)">🔷 圖形規律</div>
    <div class="tt" onclick="setType('missing',this)">❓ 填空題</div>

  </div>
  <div class="progress-wrap"><div class="pdots" id="pdots"></div><div class="plabel" id="plabel"></div></div>
  <div id="gameArea">
    <div class="qcard">
      <div class="twrap"><div class="tbar-bg"><div class="tbar" id="tbar"></div></div><div class="tnum" id="tnum">60</div></div>
      <div class="qlabel" id="qlabel">準備好了嗎？</div>
      <div id="qcontent" class="qtext" style="color:var(--sub);font-size:1rem;line-height:1.6">選好難度和模式<br>按下「開始遊戲」！</div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="fb" id="fb"></div>
    <div class="controls">
      <button class="btn primary" id="mainBtn" onclick="startGame()">🚀 開始遊戲</button>
      <button class="btn secondary" onclick="resetGame()">🔄 重設</button>
    </div>
  </div>
  <div class="result" id="result">
    <div class="remoji" id="rEmoji">🎉</div><div class="rtitle" id="rTitle">太厲害了！</div>
    <div class="rgrade" id="rGrade">S</div><div class="rsub" id="rSub">完成20題挑戰</div>
    <div class="rstats">
      <div class="sbox"><div class="n" id="rScore">0</div><div class="t">總分數</div></div>
      <div class="sbox"><div class="n" id="rCorrect">0/20</div><div class="t">答對題數</div></div>
      <div class="sbox"><div class="n" id="rStreak">0</div><div class="t">最高連勝</div></div>
      <div class="sbox"><div class="n" id="rAvg">-s</div><div class="t">平均答題</div></div>
    </div>
    <div class="bdown"><h4>各類型成績</h4><div id="brows"></div></div>
    <button class="btn primary" style="margin-top:12px;max-width:200px;margin-left:auto;margin-right:auto;display:block" onclick="resetGame()">🎮 再挑戰一次</button>
  </div>
</div>
<script>
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=a=>a[ri(0,a.length-1)];
const sh=a=>[...a].sort(()=>Math.random()-.5);
let diff='easy',mode='mix',score=0,streak=0,maxStreak=0,correct_=0;
let qi=0,answered=false,running=false,timer=null,timeLeft=60;
let results=[],times=[],typeLog={},curQ=null;
const TOTAL=20,T=60;
function setDiff(d,el){diff=d;document.querySelectorAll('.db').forEach(b=>b.classList.remove('on'));el.classList.add('on');if(running)resetGame();}
function setType(t,el){mode=t;document.querySelectorAll('.tt').forEach(b=>b.classList.remove('on'));el.classList.add('on');if(running)resetGame();}

// ── MATH ────────────────────────────────────────
function seq(arr,ans){return{kind:'seq',seq:[...arr,'?'],ans,hint:'',typeKey:'math'};}
const MG={
easy:[
  // ── 基本等差 ──
  ()=>{const s=ri(2,30),d=ri(2,9);const a=[s,s+d,s+2*d,s+3*d,s+4*d];return seq(a.slice(0,4),a[4]);},
  ()=>{const s=ri(40,150),d=ri(3,15);const a=[s,s-d,s-2*d,s-3*d,s-4*d];return seq(a.slice(0,4),a[4]);},
  ()=>{const s=ri(5,50),d=ri(10,25);const a=[s,s+d,s+2*d,s+3*d,s+4*d];return seq(a.slice(0,4),a[4]);},
  // ── 等比 ──
  ()=>{const s=ri(2,12);return seq([s,s*2,s*4,s*8],s*16);},
  ()=>{const s=ri(1,6);return seq([s,s*3,s*9,s*27],s*81);},
  ()=>{const s=ri(1,4),m=ri(2,3);return seq([s,s*m,s*m**2,s*m**3],s*m**4);},
  // ── 奇偶數列 ──
  ()=>{const s=ri(1,10)*2-1;return seq([s,s+2,s+4,s+6],s+8);},
  ()=>{const s=ri(1,10)*2;return seq([s,s+2,s+4,s+6],s+8);},
  // ── 5/10的倍數 ──
  ()=>{const s=ri(1,8)*5;return seq([s,s+5,s+10,s+15],s+20);},
  ()=>{const s=ri(1,5)*10;return seq([s,s+10,s+20,s+30],s+40);},
  // ── 前兩項之和 ──
  ()=>{const a=ri(1,8),b=ri(1,8);const arr=[a,b,a+b,a+2*b,a+3*b];return seq(arr.slice(0,4),arr[4]);},
  ()=>{const a=ri(2,6),b=ri(2,6);const arr=[a,b,a+b,b+(a+b),a+b+b+(a+b)];return seq(arr.slice(0,4),arr[4]);},
  // ── 交替加 ──
  ()=>{const s=ri(2,20),a=ri(2,6),b=ri(3,9);const arr=[s,s+a,s+a+b,s+2*a+b,s+2*a+2*b];return seq(arr.slice(0,4),arr[4]);},
  ()=>{const s=ri(5,30),a=ri(3,8),b=ri(2,6);const arr=[s,s+a,s+a-b,s+2*a-b,s+2*a-2*b];return seq(arr.slice(0,4),arr[4]);},
  // ── 三角形數 ──
  ()=>{const off=ri(0,4);const tri=n=>n*(n+1)/2;const a=[1,2,3,4,5].map(n=>tri(n+off));return seq(a.slice(0,4),a[4]);},
  // ── 每次乘2再加1 ──
  ()=>{const s=ri(1,5);const arr=[s,s*2+1,(s*2+1)*2+1,((s*2+1)*2+1)*2+1];return seq(arr.slice(0,3),arr[3]);},
  // ── 中間挖空 ──
  ()=>{const s=ri(1,10),d=ri(3,8);const f=[s,s+d,s+2*d,s+3*d,s+4*d];const mi=ri(1,3);const d2=[...f];d2[mi]='?';return{kind:'seq',seq:d2,ans:f[mi],hint:'',typeKey:'math'};},
  // ── 加固定步距（大數）──
  ()=>{const s=ri(100,300),d=ri(10,30);const a=[s,s+d,s+2*d,s+3*d,s+4*d];return seq(a.slice(0,4),a[4]);},
  // ── 每次減固定（大數）──
  ()=>{const s=ri(200,500),d=ri(20,50);const a=[s,s-d,s-2*d,s-3*d,s-4*d];return seq(a.slice(0,4),a[4]);},
  // ── 平方根感覺（完全平方數）──
  ()=>{const s=ri(1,6);return seq([s**2,(s+1)**2,(s+2)**2,(s+3)**2],(s+4)**2);},
],
medium:[
  // ── 費氏 ──
  ()=>{const f=[ri(1,6),ri(1,6)];for(let i=2;i<7;i++)f.push(f[i-1]+f[i-2]);return seq(f.slice(0,5),f[5]);},
  ()=>{const f=[ri(2,8),ri(1,5)];for(let i=2;i<7;i++)f.push(f[i-1]+f[i-2]);return seq(f.slice(0,5),f[5]);},
  // ── 平方數列 ──
  ()=>{const s=ri(1,8);const a=[s**2,(s+1)**2,(s+2)**2,(s+3)**2,(s+4)**2];return seq(a.slice(0,4),a[4]);},
  ()=>{const s=ri(3,9);const a=[s**2,(s+1)**2,(s+2)**2,(s+3)**2,(s+4)**2];return seq(a.slice(0,4),a[4]);},
  // ── 立方數列 ──
  ()=>{const s=ri(1,5);const a=[s**3,(s+1)**3,(s+2)**3,(s+3)**3];return seq(a.slice(0,3),a[3]);},
  // ── 等比 ──
  ()=>{const s=ri(2,5),m=ri(2,4);const a=[s,s*m,s*m**2,s*m**3,s*m**4];return seq(a.slice(0,4),a[4]);},

function shape(arr,ans,eset){
  // eset = 整個 emoji set，用來補充干擾選項
  const as=String(ans);
  // 先從序列裡找不同的元素
  const inS=[...new Set(arr.map(String).filter(s=>s!==as))];
  let pool=sh(inS);
  // 不夠的話從同一個 emoji set 補（絕不用幾何名詞）
  if(pool.length<3 && eset){
    const extra=sh(eset.map(String).filter(e=>e!==as&&!inS.includes(e)));
    pool=[...pool,...extra];
  }
  // 還不夠就從所有 ES 裡補
  if(pool.length<3){
    const allEmoji=[].concat(...ES).map(String).filter(e=>e!==as&&!pool.includes(e));
    pool=[...pool,...sh(allEmoji)];
  }
  const c=sh([as,...pool.slice(0,3)]);
  return{kind:'shape',seq:[...arr,'?'],ans:as,hint:'',typeKey:'shape',choices:c};
}

      <text x="${rightX+F/2}" y="${rightY-3}" fill="#a78bfa" font-size="9" font-family="Nunito" text-anchor="middle" font-weight="700">右</text>
      <rect x="${rightX}" y="${rightY}" width="${F}" height="${F}" fill="#1a1840" stroke="#a78bfa" stroke-width="1.5" rx="3"/>
      ${PATS[assign[rightF]](rightX+F/2, rightY+F/2, F)}
    </svg>`;
  }

  // 正確：上=face1, 前=face0, 右=face2
  const correct=makeOpt(1,0,2);
  // 錯誤：交換各面組合
  const w1=makeOpt(4,0,2); // 上面用下面圖案
  const w2=makeOpt(1,2,0); // 前右對調
  const w3=makeOpt(1,3,5); // 前用後面/右用左面

  // 題目SVG
  const QW=NW,QH=NH+24;
  const svgQ=`<svg viewBox="0 0 ${QW} ${QH}" xmlns="http://www.w3.org/2000/svg" width="${QW}" height="${QH}">
    <rect width="${QW}" height="${QH}" fill="#0f0c29" rx="6"/>
    <text x="${QW/2}" y="16" fill="#f0edff" font-size="12" font-family="Nunito" text-anchor="middle" font-weight="800">展開圖折起來，上/前/右面各是哪個圖案？</text>
    <g transform="translate(0,22)"><rect width="${NW}" height="${NH}" fill="#0f0c29" rx="5"/>${ni}</g>
  </svg>`;

  const{choices,ans}=mOpts(correct,[w1,w2,w3]);
  return{kind:'visual',svgQ,choices,ans,typeKey:'spatial'};
}

// 工具：畫一格背景
function bg(){return `<rect width="${SV}" height="${SV}" fill="#1a1840" rx="3"/>`;}

// ── 題型：每列形狀旋轉（0/45/90度，每列不同形狀）──
function gRotShape(){
  const c=SV/2;
  // 不對稱形狀：旗形、L形、Z形
  const shapes=[
    (f)=>`<polygon points="${c-20},${c+22} ${c-20},${c-22} ${c-8},${c-22} ${c-8},${c-4} ${c+22},${c-18} ${c+22},${c-4} ${c-8},${c-4}" fill="${f}"/>`,
    (f)=>`<polygon points="${c-20},${c-22} ${c-6},${c-22} ${c-6},${c+8} ${c+20},${c+8} ${c+20},${c+22} ${c-20},${c+22}" fill="${f}"/>`,
    (f)=>`<polygon points="${c-20},${c-22} ${c+4},${c-22} ${c+4},${c-4} ${c+20},${c-4} ${c+20},${c+22} ${c-4},${c+22} ${c-4},${c+4} ${c-20},${c+4}" fill="${f}"/>`,
  ];
  const fills=['#818cf8','#f43f5e','#fbbf24'];
  // 每欄旋轉：col0=0° col1=90° col2=180°
  function cell(row,col){
    const deg=[0,90,180][col];
    return `${bg()}<g transform="rotate(${deg},${c},${c})">${shapes[row](fills[row])}</g>`;
  }
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));
  const correct=cell(2,2); // row2, col2 = 180°
  // 錯誤選項：角度明顯不同（270°）、形狀錯、角度+形狀都錯
  const w1=`${bg()}<g transform="rotate(270,${c},${c})">${shapes[2](fills[2])}</g>`; // 270°（錯角度）
  const w2=`${bg()}<g transform="rotate(180,${c},${c})">${shapes[0](fills[2])}</g>`; // 形狀錯
  const w3=`${bg()}<g transform="rotate(90,${c},${c})">${shapes[2](fills[2])}</g>`;  // 90°（錯角度）
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}

// ── 題型：每格數量=列×欄（乘法表規律）──
function gMultiplyCount(){
  // 規律：每格點數 = 列乘數 × 欄乘數
  // 固定用 row=[1,2,3] col=[1,2,3]，確保結果在 posMap 範圍內
  // 顯示時在每格左上角標示列/欄的乘數，讓玩家能發現規律
  const c=SV/2;
  const fill=rf(['#818cf8','#f43f5e','#fbbf24','#22d3ee']);

  // posMap：n個點的排列位置
  const posMap=[
    [],
    [[c,c]],
    [[c-13,c],[c+13,c]],
    [[c,c-13],[c-13,c+8],[c+13,c+8]],
    [[c-13,c-13],[c+13,c-13],[c-13,c+13],[c+13,c+13]],
    [[c,c-16],[c-14,c-4],[c+14,c-4],[c-10,c+14],[c+10,c+14]],
    [[c-16,c-13],[c,c-13],[c+16,c-13],[c-16,c+13],[c,c+13],[c+16,c+13]],
  ];

  // 隨機選列乘數和欄乘數（確保乘積≤6）
  // 可用組合：row×col ≤ 6
  const combos=sh([
    {rv:[1,2,3],cv:[1,2,3]},   // 最大9→超出，改下面
    {rv:[1,2,3],cv:[1,1,2]},   // max=6
    {rv:[1,2,3],cv:[1,2,2]},   // max=6
    {rv:[1,1,2],cv:[1,2,3]},   // max=6
    {rv:[1,2,2],cv:[1,2,3]},   // max=6
    {rv:[1,2,3],cv:[1,1,1]},   // max=3
    {rv:[1,2,3],cv:[2,2,2]},   // max=6
  ]);
  const {rv,cv}=combos[0];

  function cell(n){
    const pts=posMap[Math.min(n,6)];
    return `${bg()}${pts.map(([px,py])=>svgCirc(px,py,7,fill)).join('')}`;
  }

  // counts[row][col] = rv[row] × cv[col]
  const counts=rv.map(r=>cv.map(c2=>r*c2));
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(counts[r][c2]));
  const an=counts[2][2];
  // 錯誤選項：an±1, an±2（確保在合法範圍內且不重複）
  const wrongs=[an+1,Math.max(1,an-1),an===1?an+2:an-2].map(n=>cell(Math.min(6,Math.max(1,n))));
  return mkVis(m3x3(cells),cell(an),wrongs);
}

// ── 題型：XOR格子（第三欄=第一欄 XOR 第二欄）──
// 每次隨機生成col0和col1，col2=XOR結果
// 規律：對應格子，兩個都有或都沒有→無，一個有一個沒有→有
function gXorPattern(){
  const S=SV, sz=S/3;
  const fills=sh(['#818cf8','#f43f5e','#fbbf24']);

  // 隨機生成一個3x3 bitfield（9個bit，確保不全0不全1）
  function randPat(){
    let p;
    do { p=[...Array(9)].map(()=>Math.random()>.5?1:0); }
    while(p.every(v=>v===0)||p.every(v=>v===1)||p.filter(v=>v).length<2);
    return p;
  }
  function patXor(a,b){return a.map((v,i)=>v^b[i]);}

  // 畫一個格子：pat是9個bit的陣列，fill是顏色
  function drawPat(pat,fill){
    let s=`${bg()}`;
    pat.forEach((v,i)=>{
      if(v){
        const col=i%3, row=Math.floor(i/3);
        s+=`<rect x="${col*sz+2}" y="${row*sz+2}" width="${sz-4}" height="${sz-4}" fill="${fill}" rx="2"/>`;
      }
    });
    return s;
  }

  // 每列有不同的 col0, col1, col2=XOR
  const rows=[];
  for(let r=0;r<3;r++){
    let p0,p1,p2;
    // 確保p2不跟p0或p1一樣，且不全空
    let attempts=0;
    do {
      p0=randPat(); p1=randPat(); p2=patXor(p0,p1); attempts++;
    } while((p2.every(v=>v===0)||p2.every(v=>v===1)||
             JSON.stringify(p2)===JSON.stringify(p0)||
             JSON.stringify(p2)===JSON.stringify(p1))&&attempts<30);
    rows.push([p0,p1,p2]);
  }

  const cells=[];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    cells.push(r===2&&c===2?qCell():drawPat(rows[r][c],fills[r]));
  }
  const correct=drawPat(rows[2][2],fills[2]);

  // 錯誤選項：col0、col1、隨機亂的pattern
  const w1=drawPat(rows[2][0],fills[2]); // col0（不是XOR結果）
  const w2=drawPat(rows[2][1],fills[2]); // col1（不是XOR結果）
  // w3：把正確答案的一個bit翻轉
  const wrongPat=[...rows[2][2]];
  wrongPat[ri(0,8)]=wrongPat[ri(0,8)]^1;
  const w3=drawPat(wrongPat,fills[2]);

  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}

// ── 題型：對角線規律（主對角線/副對角線有特殊標記）──
function gDiagonalRule(){
  const c=SV/2;
  const fills=sh(['#818cf8','#f43f5e','#fbbf24','#22d3ee','#4ade80']);
  // 規律：主對角線（左上到右下）顏色相同，其他格用另一顏色
  const diagFill=fills[0], otherFill=fills[1];
  const shapes=sh([
    (cx,cy,r,f)=>svgCirc(cx,cy,r,f),
    (cx,cy,r,f)=>svgRect(cx-r,cy-r,r*2,r*2,f),
    (cx,cy,r,f)=>svgDiamond(cx,cy,r,f),
  ]);
  const shapeFn=shapes[0];
  function cell(row,col){
    const isDiag=(row===col);
    const f=isDiag?diagFill:otherFill;
    const r=isDiag?22:14; // 對角線更大
    return `${bg()}${shapeFn(c,c,r,f)}`;
  }
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));
  // 答案：row2,col2 = 對角線 = 大圓diagFill
  const correct=cell(2,2);
  const w1=`${bg()}${shapeFn(c,c,22,otherFill)}`; // 顏色錯
  const w2=`${bg()}${shapeFn(c,c,14,diagFill)}`;  // 大小錯
  const w3=`${bg()}${shapeFn(c,c,14,otherFill)}`; // 都錯
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}

// ── 題型：形狀在格內移動（對角線移動）──
function gDiagMove(){

// ── 題型：每列相減（第三欄=第一欄-第二欄，用點數）──
function gSubtractCount(){
  const c=SV/2;
  const fills=sh(['#818cf8','#f43f5e','#fbbf24']);
  const posMap=[
    [[c,c]],
    [[c-12,c],[c+12,c]],

    [[c,c-16],[c-14,c-4],[c+14,c-4],[c-10,c+14],[c+10,c+14]],
  ];
  function cell(n,f){const pts=posMap[Math.min(n-1,4)];return `${bg()}${pts.map(([px,py])=>svgCirc(px,py,7,f)).join('')}`;}
  // col2 = col0 - col1（確保col0>col1）
  const makeRow=()=>{const b=ri(2,5),diff=ri(1,b-1);return[b,diff,b-diff];};
  const rows=[makeRow(),makeRow(),makeRow()];

  const an=rows[2][2];
  return mkVis(m3x3(cells),cell(an,fills[2]),[cell(an+1,fills[2]),cell(Math.max(1,an-1),fills[2]),cell(an,fills[0])]);
}

// ── 題型：每格=左格×上格÷左上格（比例規律）──
function gProportionRule(){
  const c=SV/2;
  const fills=sh(['#818cf8','#f43f5e','#fbbf24','#22d3ee']);
  // 每列大小規律：大→中→小（col0=26,col1=18,col2=10）
  // 每行形狀顏色固定
  const shapePool=sh([svgCirc,svgDiamond,svgRect.bind(null)]);
  // 簡化：每格size = baseSize / (col+1)^0.6，顏色按列
  const baseSizes=[28,20,13];
  const rowFills=fills.slice(0,3);
  function drawShape(name,cx,cy,r,f){
    if(name==='circle')return svgCirc(cx,cy,r,f);
    if(name==='square')return svgRect(cx-r,cy-r,r*2,r*2,f);
    return svgDiamond(cx,cy,r,f);
  }
  const shNames=sh(['circle','square','diamond']);
  function cell(row,col){
    const r=baseSizes[col];
    return `${bg()}${drawShape(shNames[row],c,c,r,rowFills[row])}`;
  }
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));
  const correct=cell(2,2);
  const w1=`${bg()}${drawShape(shNames[2],c,c,baseSizes[0],rowFills[2])}`; // 大小錯
  const w2=`${bg()}${drawShape(shNames[0],c,c,baseSizes[2],rowFills[2])}`; // 形狀錯
  const w3=`${bg()}${drawShape(shNames[2],c,c,baseSizes[2],rowFills[0])}`; // 顏色錯
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}

// ── 題型：雙重屬性（形狀+顏色，各自有獨立規律）──
function gDualAttr(){

  const shNames=[['circle','square','triangle'],['square','triangle','circle'],['triangle','circle','square']];
  const colFills=['#818cf8','#f43f5e','#fbbf24'];
  function drawShape(name,f,size=r){
    if(name==='circle')return svgCirc(c,c,size,f);

// ── 題型：每格=右上+左下（對角線加法）──
function gDiagAdd(){
  const c=SV/2;
  const fill=rf(['#818cf8','#22d3ee','#4ade80']);
  const posMap=[[[c,c]],[[c-12,c],[c+12,c]],[[c,c-12],[c-12,c+8],[c+12,c+8]],[[c-12,c-12],[c+12,c-12],[c-12,c+12],[c+12,c+12]],[[c,c-16],[c-14,c-4],[c+14,c-4],[c-10,c+14],[c+10,c+14]]];
  function cell(n){return `${bg()}${posMap[Math.min(n-1,4)].map(([px,py])=>svgCirc(px,py,7,fill)).join('')}`;}
  // 規律：m[r][c] = m[r-1][c] + m[r][c-1] - m[r-1][c-1]（但確保正值）
  // 用更簡單的：col0是1,2,3；col1是2,3,4；col2=col0+col1
  const c0=[ri(1,3),ri(1,3),ri(1,3)];
  const c1=[ri(1,2),ri(1,2),ri(1,2)];
  const c2=c0.map((v,i)=>v+c1[i]);
  const grid=[c0,c1,c2];
  // grid[col][row]: col0=c0,col1=c1,col2=c2
  const cells=[];
  for(let row=0;row<3;row++)for(let col=0;col<3;col++)cells.push(row===2&&col===2?qCell():cell(grid[col][row]));
  const an=grid[2][2]; // col2, row2
  return mkVis(m3x3(cells),cell(an),[cell(an+1),cell(Math.max(1,an-1)),cell(an+2)]);
}

// ── 題型：格內有兩個元素，各自獨立變化 ──
function gTwoElements(){

  const w1=`${bg()}${svgRect(c-squareSizes[2],c-squareSizes[2],squareSizes[2]*2,squareSizes[2]*2,squareFill)}${svgCirc(circlePos[0][0],circlePos[0][1],7,circleFill)}`;
  const w2=`${bg()}${svgRect(c-squareSizes[0],c-squareSizes[0],squareSizes[0]*2,squareSizes[0]*2,squareFill)}${svgCirc(circlePos[2][0],circlePos[2][1],7,circleFill)}`;
  const w3=`${bg()}${svgRect(c-squareSizes[1],c-squareSizes[1],squareSizes[1]*2,squareSizes[1]*2,squareFill)}${svgCirc(circlePos[1][0],circlePos[1][1],7,circleFill)}`;
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);

// 每列形狀數量遞增（1→2→3），每欄顏色固定
function gShapeCount(){

  const shFn=rf([
    (f)=>svgCirc(c,c,10,f),
    (f)=>svgRect(c-10,c-10,20,20,f),
    (f)=>svgDiamond(c,c,12,f),
  ]);
  const fills=sh(['#818cf8','#f43f5e','#fbbf24']);
  // 每格畫 (row+1) 個形狀，排成一排

// 每格有一條線，角度按規律旋轉
function gLineAngle(){
  const c=SV/2,L=24;

  return mkVis(m3x3(cells),correct,[

    3:[[c-14,c-14],[c,c],[c+14,c+14]],

// 形狀在格內縮放（每欄縮小），背景顯示輪廓
function gShrinkShape(){

  function drawOutline(name,size){

    return `<polygon points="${c},${c-size} ${c+size},${c} ${c},${c+size} ${c-size},${c}" fill="none" stroke="${stroke}" stroke-width="${sw}"/>`;
  }

  }

  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));

// 旋轉方向規律（每格箭頭角度）
function gArrowRotate(){
  const c=SV/2;
  const fills=sh(['#818cf8','#f43f5e','#fbbf24']);
  // 每格箭頭角度：row0=[0,45,90], row1=[45,90,135], row2=[90,135,180]
  function arrow(deg,fill){
    const R=22,r2=9;
    const body=`<polygon points="${c-R},${c-r2} ${c},${c-r2} ${c},${c-R*0.7} ${c+R},${c} ${c},${c+R*0.7} ${c},${c+r2} ${c-R},${c+r2}" fill="${fill}"/>`;
    return `<g transform="rotate(${deg},${c},${c})">${body}</g>`;
  }
  function cell(row,col){
    const deg=(row+col)*45;
    return `${bg()}${arrow(deg,fills[row])}`;
  }
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));
  const correct=cell(2,2); // deg=(2+2)*45=180°, fills[2]
  const w1=`${bg()}${arrow(225,fills[2])}`; // 角度多45°
  const w2=`${bg()}${arrow(180,fills[0])}`; // 顏色錯
  const w3=`${bg()}${arrow(135,fills[2])}`; // 角度少45°
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}

// 每格有N個同心環（N=行號+1）且形狀按列變
function gConcentricVar(){
  const c=SV/2;
  const shTypes=['circle','square','diamond'];
  const fills=sh(['#818cf8','#f43f5e','#fbbf24']);
  function drawConc(shType,layers,fill){
    let s='';
    for(let i=layers;i>=1;i--){
      const r=(c-5)*i/layers;
      const isFill=i===layers;
      const f=isFill?fill:'#1a1840';
      if(shType==='circle')s+=`<circle cx="${c}" cy="${c}" r="${r}" fill="${f}" stroke="${fill}" stroke-width="1.5"/>`;
      else if(shType==='square')s+=`<rect x="${c-r}" y="${c-r}" width="${r*2}" height="${r*2}" fill="${f}" stroke="${fill}" stroke-width="1.5" rx="2"/>`;
      else s+=`<polygon points="${c},${c-r} ${c+r},${c} ${c},${c+r} ${c-r},${c}" fill="${f}" stroke="${fill}" stroke-width="1.5"/>`;
    }
    return s;
  }
  function cell(row,col){return `${bg()}${drawConc(shTypes[col],row+1,fills[col])}`;}
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));
  const correct=cell(2,2);
  const w1=`${bg()}${drawConc(shTypes[2],1,fills[2])}`; // 層數錯（1層）
  const w2=`${bg()}${drawConc(shTypes[0],3,fills[2])}`; // 形狀錯
  const w3=`${bg()}${drawConc(shTypes[2],2,fills[2])}`; // 層數錯（2層）
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}

// 每格方格數=欄號+1，顏色按行（分格填色）

// 每格顯示第N個圖形（序列展示在格內）
function gSeqInGrid(){
  const c=SV/2;
  // 3種形狀循環：格(r,c)顯示第(r*3+c+1)個
  const shSeq=['circle','square','triangle','diamond','circle','square','triangle','diamond','circle'];
  const fills=sh(['#818cf8','#f43f5e','#fbbf24','#22d3ee']);
  const fillSeq=fills.concat(fills); // 循環顏色
  function draw(name,fill,r2=18){
    if(name==='circle')return svgCirc(c,c,r2,fill);
    if(name==='square')return svgRect(c-r2,c-r2,r2*2,r2*2,fill);

// 雙形狀：大小關係（大圓+小圓，按列比例變化）

  // col0:大圓大小方=26/8, col1:相等=17/17, col2:小圓大=8/26
  const sizes=[[26,8],[17,17],[8,26]];
  function cell(row,col){

  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));

  const w1=`${bg()}${svgCirc(c-14,c,sizes[0][0],fills[2])}${svgRect(c+2,c-sizes[0][1],sizes[0][1]*2,sizes[0][1]*2,'#f0edff')}`; // 大小比例錯
  const w2=`${bg()}${svgCirc(c-14,c,sizes[2][0],fills[0])}${svgRect(c+2,c-sizes[2][1],sizes[2][1]*2,sizes[2][1]*2,'#f0edff')}`; // 顏色錯
  const w3=`${bg()}${svgCirc(c-14,c,sizes[1][0],fills[2])}${svgRect(c+2,c-sizes[1][1],sizes[1][1]*2,sizes[1][1]*2,'#f0edff')}`; // 中間值

// 每格=前格旋轉45°（螺旋旋轉規律）
function gSpiralRotate(){
  const c=SV/2;
  const fills=sh(['#818cf8','#f43f5e','#fbbf24']);
  // 不對稱L形，每格旋轉45°累積
  function lShape(fill){
    return `<polygon points="${c-20},${c-20} ${c+4},${c-20} ${c+4},${c-4} ${c+20},${c-4} ${c+20},${c+20} ${c-20},${c+20}" fill="${fill}"/>`;
  }
  // grid(r,c)的旋轉角度 = (r*3+c)*45
  function cell(row,col){
    const deg=(row*3+col)*45%360;
    return `${bg()}<g transform="rotate(${deg},${c},${c})">${lShape(fills[row])}</g>`;
  }
  const cells=[];
  for(let r=0;r<3;r++)for(let c2=0;c2<3;c2++)cells.push(r===2&&c2===2?qCell():cell(r,c2));
  // 答案：(2*3+2)*45=360°=0°, fills[2]
  const correct=cell(2,2);
  const w1=`${bg()}<g transform="rotate(45,${c},${c})">${lShape(fills[2])}</g>`;  // 45°
  const w2=`${bg()}<g transform="rotate(0,${c},${c})">${lShape(fills[0])}</g>`;   // 顏色錯
  const w3=`${bg()}<g transform="rotate(315,${c},${c})">${lShape(fills[2])}</g>`; // 315°
  return mkVis(m3x3(cells),correct,[w1,w2,w3]);
}


// ══════════════════════════════════════════════════
// 邏輯運算題：AND / OR / XOR（隨機格子圖案）
// ══════════════════════════════════════════════════
// 每格是一個 3×3 小方格陣列（9個格子各自填/空）
// 題目：A op B = ?  選出正確的結果

function randomBits(density=0.5){
  // 生成9個bit，density控制填色比例
  return Array.from({length:9},()=>Math.random()<density?1:0);
}
function bitsAnd(a,b){return a.map((v,i)=>v&b[i]);}
function bitsOr(a,b){return a.map((v,i)=>v|b[i]);}
function bitsXor(a,b){return a.map((v,i)=>v^b[i]);}
function bitsNot(a){return a.map(v=>v?0:1);}

function drawBits(bits,fill,emptyFill='#2a2560'){
  const sz=SV/3;
  return bits.map((v,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=col*sz,y=row*sz;
    const f=v?fill:emptyFill;
    return `<rect x="${x+1.5}" y="${y+1.5}" width="${sz-3}" height="${sz-3}" fill="${f}" rx="2"/>`;
  }).join('');
}

function drawBitsCell(bits,fill){
  return `${bg()}${drawBits(bits,fill)}`;
}

// 確保兩個bit陣列不完全相同
function distinctBits(a,b){
  return a.some((v,i)=>v!==b[i]);
}

// 生成一道 AND/OR/XOR 題
function gLogicOp(opName){
  const fills=sh(['#818cf8','#f43f5e','#fbbf24','#22d3ee','#4ade80']);
  const fillA=fills[0], fillB=fills[1], fillAns=fills[2];

  // 隨機生成 A 和 B，確保不完全相同、結果不全空也不全填
  let A,B,C;
  let tries=0;
  do {
    A=randomBits(0.45);
    B=randomBits(0.45);
    if(opName==='AND') C=bitsAnd(A,B);
    else if(opName==='OR') C=bitsOr(A,B);
    else C=bitsXor(A,B);
    tries++;
  } while(tries<30 && (!distinctBits(A,B) || C.every(v=>!v) || C.every(v=>v) || !distinctBits(A,C) || !distinctBits(B,C)));

  // 3個錯誤選項：NOT C / C OR A / 隨機亂位
  const wrong1=bitsNot(C);
  const wrong2=opName==='AND'?bitsOr(A,B):bitsAnd(A,B);
  // wrong3：把C隨機翻轉2-3個bit
  const wrong3=[...C];
  const flips=sh([0,1,2,3,4,5,6,7,8]).slice(0,ri(2,3));
  flips.forEach(i=>wrong3[i]=wrong3[i]?0:1);

  // 確保錯誤選項都不等於正確答案
  const allWrongs=[wrong1,wrong2,wrong3].filter(w=>distinctBits(w,C));
  while(allWrongs.length<3){
    const extra=[...C];
    sh([0,1,2,3,4,5,6,7,8]).slice(0,ri(1,2)).forEach(i=>extra[i]=extra[i]?0:1);
    if(distinctBits(extra,C)) allWrongs.push(extra);
  }

  const opSymbol={'AND':'∩','OR':'∪','XOR':'⊕'}[opName];

  // 題目SVG：顯示 A [op] B = ?（橫向排列）
  const W=SV,H=SV,gap=18,labelH=16;
  const totalW=W*3+gap*2+W; // A + op + B + = + ?
  const svgQ=`<svg viewBox="0 0 ${totalW} ${H+labelH}" xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${H+labelH}">
    <rect width="${totalW}" height="${H+labelH}" fill="#0f0c29" rx="6"/>
    <!-- A -->
    <text x="${W/2}" y="12" fill="${fillA}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">A</text>
    <g transform="translate(0,${labelH})">${bg()}${drawBits(A,fillA)}</g>
    <!-- op -->
    <text x="${W+gap/2}" y="${H/2+labelH}" fill="#f0edff" font-size="20" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">${opSymbol}</text>
    <!-- B -->
    <text x="${W+gap+W/2}" y="12" fill="${fillB}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">B</text>
    <g transform="translate(${W+gap},${labelH})">${bg()}${drawBits(B,fillB)}</g>
    <!-- = -->
    <text x="${W*2+gap*1.5+gap/2}" y="${H/2+labelH}" fill="#f0edff" font-size="20" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">=</text>
    <!-- ? -->
    <g transform="translate(${W*2+gap*2},${labelH})">${qCell()}</g>
  </svg>`;

  const correctSvg=drawBitsCell(C,fillAns);
  const{choices,ans}=mOpts(correctSvg,allWrongs.slice(0,3).map(w=>drawBitsCell(w,fillAns)));
  return{kind:'visual',svgQ,choices,ans,typeKey:'shape'};
}

function gAnd(){return gLogicOp('AND');}
function gOr(){return gLogicOp('OR');}
function gXor(){return gLogicOp('XOR');}

// 進階：A AND B AND C（三個操作數）
function gAndAnd(){
  const fills=['#818cf8','#f43f5e','#fbbf24','#22d3ee'];
  let A,B,C2,result;
  let tries=0;
  do{
    A=randomBits(0.6);B=randomBits(0.6);C2=randomBits(0.6);
    result=bitsAnd(bitsAnd(A,B),C2);
    tries++;
  }while(tries<30&&(result.every(v=>!v)||result.every(v=>v)));

  const wrong1=bitsAnd(A,B);
  const wrong2=bitsOr(bitsAnd(A,B),C2);
  const wrong3=[...result];
  sh([0,1,2,3,4,5,6,7,8]).slice(0,2).forEach(i=>wrong3[i]=wrong3[i]?0:1);

  const W=SV,labelH=16,gap=14;
  const totalW=W*4+gap*3+W;
  const svgQ=`<svg viewBox="0 0 ${totalW} ${W+labelH}" xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${W+labelH}">
    <rect width="${totalW}" height="${W+labelH}" fill="#0f0c29" rx="6"/>
    <text x="${W/2}" y="12" fill="${fills[0]}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">A</text>
    <g transform="translate(0,${labelH})">${bg()}${drawBits(A,fills[0])}</g>
    <text x="${W+gap/2}" y="${W/2+labelH}" fill="#f0edff" font-size="16" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">∩</text>
    <text x="${W+gap+W/2}" y="12" fill="${fills[1]}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">B</text>
    <g transform="translate(${W+gap},${labelH})">${bg()}${drawBits(B,fills[1])}</g>
    <text x="${W*2+gap*1.5+gap/2}" y="${W/2+labelH}" fill="#f0edff" font-size="16" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">∩</text>
    <text x="${W*2+gap*2+W/2}" y="12" fill="${fills[2]}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">C</text>
    <g transform="translate(${W*2+gap*2},${labelH})">${bg()}${drawBits(C2,fills[2])}</g>
    <text x="${W*3+gap*2.5+gap/2}" y="${W/2+labelH}" fill="#f0edff" font-size="16" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">=</text>
    <g transform="translate(${W*3+gap*3},${labelH})">${qCell()}</g>
  </svg>`;

  const correctSvg=drawBitsCell(result,fills[3]);
  const allWrongs=[wrong1,wrong2,wrong3].map(w=>drawBitsCell(w,fills[3]));
  const{choices,ans}=mOpts(correctSvg,allWrongs);
  return{kind:'visual',svgQ,choices,ans,typeKey:'shape'};
}

// 進階：(A OR B) AND C
function gOrAndCombo(){
  const fills=['#818cf8','#f43f5e','#fbbf24','#4ade80'];
  let A,B,C2,result;
  let tries=0;
  do{
    A=randomBits(0.45);B=randomBits(0.45);C2=randomBits(0.55);
    result=bitsAnd(bitsOr(A,B),C2);
    tries++;
  }while(tries<30&&(result.every(v=>!v)||result.every(v=>v)));

  const wrong1=bitsOr(A,B);          // 忘記AND C
  const wrong2=bitsAnd(A,C2);        // 忘記OR B
  const wrong3=bitsOr(bitsAnd(A,B),C2); // 順序錯
  const W=SV,labelH=18,gap=12;
  const totalW=W*4+gap*4;
  const svgQ=`<svg viewBox="0 0 ${totalW} ${W+labelH+8}" xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${W+labelH+8}">
    <rect width="${totalW}" height="${W+labelH+8}" fill="#0f0c29" rx="6"/>
    <text x="${W/2}" y="13" fill="${fills[0]}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">A</text>
    <g transform="translate(0,${labelH})">${bg()}${drawBits(A,fills[0])}</g>
    <text x="${W+gap/2}" y="${W/2+labelH}" fill="#a78bfa" font-size="15" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">∪</text>
    <text x="${W+gap+W/2}" y="13" fill="${fills[1]}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">B</text>
    <g transform="translate(${W+gap},${labelH})">${bg()}${drawBits(B,fills[1])}</g>
    <text x="${W*2+gap*1.5+gap/2}" y="${W/2+labelH}" fill="#f43f5e" font-size="15" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">∩</text>
    <text x="${W*2+gap*2+W/2}" y="13" fill="${fills[2]}" font-size="11" font-family="Nunito" text-anchor="middle" font-weight="800">C</text>
    <g transform="translate(${W*2+gap*2},${labelH})">${bg()}${drawBits(C2,fills[2])}</g>
    <text x="${W*3+gap*3+gap/2}" y="${W/2+labelH}" fill="#f0edff" font-size="15" font-family="Nunito" text-anchor="middle" dominant-baseline="middle" font-weight="900">=</text>
    <g transform="translate(${W*3+gap*4},${labelH})">${qCell()}</g>
  </svg>`;

  const correctSvg=drawBitsCell(result,fills[3]);
  const allWrongs=[wrong1,wrong2,wrong3].map(w=>drawBitsCell(w,fills[3]));
  const{choices,ans}=mOpts(correctSvg,allWrongs);
  return{kind:'visual',svgQ,choices,ans,typeKey:'shape'};
}

// ── GENERATE ────────────────────────────────────
function pickGen(gens){for(let i=0;i<10;i++){const g=rf(gens);const q=g();if(q&&q.ans!==undefined)return q;}return gens[0]();}
function generateQ(){
  const allTypes=['math','calc','shape','missing'];
  let t;
  if(mode==='mix'){const cycle=['math','calc','shape','missing','shape','math','calc','shape','missing','shape','math','calc','shape','missing','shape','math','calc','shape','missing','shape'];t=cycle[qi]||rf(allTypes);}
  else t=mode;
  const gens={math:MG[diff],calc:CG[diff],shape:SHG[diff],missing:MISG[diff]};
  // shape 模式只用九宮格矩陣題
  if(t==='shape'){
    let q=pickGen(SPATG[diff]);q.typeKey='shape';return q;
  }
  let q=pickGen(gens[t]);q.typeKey=q.typeKey||t;return q;
}

// ── CHOICES ─────────────────────────────────────
function makeChoices(q){
  if(Array.isArray(q.choices)&&q.choices.length>=4)return q.choices;
  const ans=q.ans;
  if(typeof ans==='string'&&isNaN(Number(ans))){const pool=['正方形','長方形','三角形','梯形','圓形','菱形'];return sh([ans,...sh(pool.filter(s=>s!==ans)).slice(0,3)]);}
  const n=Number(ans);const sp={easy:[1,2,3,5],medium:[2,5,10,15],hard:[3,8,14,21],hell:[4,10,18,30]}[diff];
  const opts=new Set([n]);let tries=0;
  while(opts.size<4&&tries<120){const d=rf(sp)*(Math.random()>.5?1:-1);const v=Math.round(n+d);if(v>=0&&v!==n)opts.add(v);tries++;}
  let ext=1;while(opts.size<4){opts.add(n+ext);ext++;}return sh([...opts]);
}

// ── RENDER ──────────────────────────────────────
function el(tag,cls=''){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function render(q){
  curQ=q;
  const QC=document.getElementById('qcontent'),QL=document.getElementById('qlabel'),CD=document.getElementById('choices');
  CD.className='choices';QC.className='qtext';QC.removeAttribute('style');
  const labels={math:'數列規律',calc:'四則運算',shape:'圖形規律',missing:'填空題',spatial:'空間邏輯'};
  QL.textContent=labels[q.typeKey]||'動動腦';
  if(q.kind==='seq'){
    QC.innerHTML='';const row=el('div','seq-row');
    q.seq.forEach((v,i)=>{const c=el('div','sc'+(v==='?'?' blank':''));c.textContent=String(v);row.appendChild(c);if(i<q.seq.length-1){const a=el('div','sarr');a.textContent='→';row.appendChild(a);}});
    QC.appendChild(row);
  }else if(q.kind==='shape'){
    QC.innerHTML='';const row=el('div','shape-row');
    q.seq.forEach((v,i)=>{const c=el('div','shc'+(v==='?'?' blank':''));c.style.fontSize=[...String(v)].length>2?'.9rem':'1.6rem';c.textContent=String(v);row.appendChild(c);if(i<q.seq.length-1){const a=el('div');a.style.cssText='color:var(--sub);font-size:.82rem;padding:0 2px';a.textContent='→';row.appendChild(a);}});
    QC.appendChild(row);
  }else if(q.kind==='calc'){
    QC.innerHTML=`<span style="letter-spacing:2px">${q.expr}</span>`;
  }else if(q.kind==='visual'){
    QC.innerHTML='';const wrap=el('div','visual-q-wrap');const qsvg=el('div','visual-q-svg');qsvg.innerHTML=q.svgQ;wrap.appendChild(qsvg);QC.appendChild(wrap);
    CD.className='visual-choices';CD.innerHTML='';
    q.choices.forEach(c=>{
      const b=el('button','vcb');b.innerHTML=`${c.svg}<span class="vcb-label">${c.label}</span>`;
      b.onclick=()=>{if(answered)return;answered=true;clearInterval(timer);const elapsed=T-timeLeft;
        document.querySelectorAll('.vcb').forEach(btn=>{btn.disabled=true;if(btn.querySelector('.vcb-label').textContent===q.ans)btn.classList.add('ok');});
        const ok=c.label===q.ans;if(ok){b.classList.add('ok');hCorrect(elapsed);}else{b.classList.add('no');hWrong();}
        showFb(ok,q.ans);refreshScore();updateDots();showNextBtn();};
      CD.appendChild(b);});return;
  }
  const choices=makeChoices(q);CD.innerHTML='';
  const isTxt=choices.some(c=>typeof c==='string'&&c.length>4&&isNaN(Number(c)));
  choices.forEach(c=>{const b=el('button','cb'+(isTxt?' sm':''));b.textContent=String(c);b.onclick=()=>checkAns(c,b,q.ans);CD.appendChild(b);});
}
function hCorrect(elapsed){const base={easy:10,medium:20,hard:35,hell:55}[diff];const tB=Math.round((timeLeft/T)*base*.5);const sB=streak>=5?20:streak>=3?10:0;const pts=base+tB+sB;score+=pts;streak++;correct_++;if(streak>maxStreak)maxStreak=streak;times.push(elapsed);(typeLog[curQ.typeKey]=typeLog[curQ.typeKey]||{c:0,w:0}).c++;results.push('ok');if(streak>=3)showBadge(streak);}
function hWrong(){streak=0;(typeLog[curQ.typeKey]=typeLog[curQ.typeKey]||{c:0,w:0}).w++;results.push('no');}
function showFb(ok,correctAns){const fb=document.getElementById('fb');if(ok){fb.className='fb ok';fb.textContent=streak>=5?`🔥 連勝${streak}！`:streak>=3?`⚡ 連勝${streak}！`:`✅ 答對！`;}else{fb.className='fb no';fb.textContent=`❌ 答錯！正確答案是 ${correctAns}`;}}
function checkAns(chosen,btn,correct){if(answered)return;answered=true;clearInterval(timer);const elapsed=T-timeLeft;document.querySelectorAll('.cb').forEach(b=>{b.disabled=true;if(String(b.textContent)===String(correct))b.classList.add('ok');});const ok=String(chosen)===String(correct);if(ok){btn.classList.add('ok');hCorrect(elapsed);}else{btn.classList.add('no');hWrong();}showFb(ok,correct);refreshScore();updateDots();showNextBtn();}
function showNextBtn(){const b=document.getElementById('mainBtn');b.style.display='';b.textContent=qi<TOTAL-1?'▶ 下一題':'🏆 查看結果';b.onclick=nextQ;}
function startTimer(){clearInterval(timer);timeLeft=T;const bar=document.getElementById('tbar'),num=document.getElementById('tnum');bar.style.width='100%';bar.className='tbar';num.textContent=T;
  timer=setInterval(()=>{timeLeft=Math.max(0,timeLeft-.1);const pct=(timeLeft/T)*100;bar.style.width=pct+'%';num.textContent=Math.ceil(timeLeft);if(pct<20)bar.className='tbar warn';
    if(timeLeft<=0){clearInterval(timer);if(!answered){answered=true;streak=0;const fb=document.getElementById('fb');fb.className='fb tm';fb.textContent=`⏰ 時間到！正確答案是 ${curQ.ans}`;
      document.querySelectorAll('.cb,.vcb').forEach(b=>{b.disabled=true;});
      document.querySelectorAll('.vcb').forEach(b=>{if(b.querySelector('.vcb-label')?.textContent===String(curQ.ans))b.classList.add('ok');});
      document.querySelectorAll('.cb').forEach(b=>{if(String(b.textContent)===String(curQ.ans))b.classList.add('ok');});
      (typeLog[curQ.typeKey]=typeLog[curQ.typeKey]||{c:0,w:0}).w++;results.push('tm');refreshScore();updateDots();showNextBtn();}}},100);}
function nextQ(){qi++;if(qi>=TOTAL){showResult();return;}answered=false;document.getElementById('fb').className='fb';document.getElementById('fb').textContent='';document.getElementById('mainBtn').style.display='none';document.getElementById('vProg').textContent=`${qi+1}/${TOTAL}`;updateDots();render(generateQ());startTimer();}
function startGame(){running=true;qi=0;score=0;streak=0;maxStreak=0;correct_=0;results=[];times=[];typeLog={};answered=false;document.getElementById('fb').textContent='';document.getElementById('fb').className='fb';document.getElementById('mainBtn').style.display='none';document.getElementById('result').classList.remove('show');document.getElementById('gameArea').style.display='block';document.getElementById('vProg').textContent=`1/${TOTAL}`;initDots();refreshScore();render(generateQ());startTimer();}
function resetGame(){clearInterval(timer);running=false;qi=0;score=0;streak=0;maxStreak=0;correct_=0;results=[];times=[];typeLog={};answered=false;document.getElementById('fb').textContent='';document.getElementById('fb').className='fb';document.getElementById('qcontent').innerHTML='選好難度和模式<br>按下「開始遊戲」！';document.getElementById('qcontent').style.cssText='color:var(--sub);font-size:1rem;line-height:1.6';document.getElementById('qlabel').textContent='準備好了嗎？';document.getElementById('choices').innerHTML='';document.getElementById('mainBtn').textContent='🚀 開始遊戲';document.getElementById('mainBtn').onclick=startGame;document.getElementById('mainBtn').style.display='';document.getElementById('result').classList.remove('show');document.getElementById('gameArea').style.display='block';document.getElementById('tbar').style.width='100%';document.getElementById('tbar').className='tbar';document.getElementById('tnum').textContent=60;document.getElementById('vProg').textContent='-/20';refreshScore();initDots();}
function showResult(){clearInterval(timer);document.getElementById('gameArea').style.display='none';document.getElementById('result').classList.add('show');const pct=correct_/TOTAL;const grade=pct>=.95?'S+':pct>=.85?'S':pct>=.7?'A':pct>=.55?'B':pct>=.4?'C':'D';const gc={'S+':'#fbbf24','S':'#34d399','A':'#60a5fa','B':'#a78bfa','C':'#fb923c','D':'#f87171'};document.getElementById('rEmoji').textContent=pct>=.9?'🏆':pct>=.75?'🌟':pct>=.55?'👍':pct>=.4?'💪':'😅';document.getElementById('rTitle').textContent=pct>=.9?'超級天才！':pct>=.75?'非常優秀！':pct>=.55?'繼續加油！':pct>=.4?'還需練習！':'多加油哦！';document.getElementById('rGrade').textContent=grade;document.getElementById('rGrade').style.color=gc[grade];document.getElementById('rSub').textContent=({easy:'🌱簡單(10歲)',medium:'⚡中等(12歲)',hard:'🔥困難(14歲)',hell:'💀地獄(16歲)'}[diff])+` · 共 ${score} 分`;document.getElementById('rScore').textContent=score;document.getElementById('rCorrect').textContent=`${correct_}/${TOTAL}`;document.getElementById('rStreak').textContent=maxStreak;document.getElementById('rAvg').textContent=times.length?(Math.round(times.reduce((a,b)=>a+b,0)/times.length*10)/10)+'s':'-';const tn={math:'🔢 數列規律',calc:'➕ 四則運算',shape:'🔷 圖形規律',missing:'❓ 填空題',spatial:'🧩 空間邏輯'};const tc={math:'#38bdf8',calc:'#34d399',shape:'#fb923c',missing:'#818cf8',spatial:'#f472b6'};const br=document.getElementById('brows');br.innerHTML='';Object.entries(typeLog).forEach(([t,v])=>{const tot=v.c+v.w,p=tot?Math.round(v.c/tot*100):0;br.innerHTML+=`<div class="brow"><div class="bdot" style="background:${tc[t]||'#888'}"></div><span style="flex:0 0 88px;font-size:.78rem">${tn[t]||t}</span><div class="bbg"><div class="bbar" style="width:${p}%;background:${tc[t]||'#888'}"></div></div><span style="font-size:.76rem;color:var(--sub);min-width:52px;text-align:right">${v.c}/${tot} (${p}%)</span></div>`;});}
function refreshScore(){document.getElementById('vScore').textContent=score;document.getElementById('vStreak').textContent=streak;document.getElementById('vCorrect').textContent=correct_;}
function initDots(){const d=document.getElementById('pdots');d.innerHTML='';for(let i=0;i<TOTAL;i++){const dot=el('div','dot'+(i===0?' cur':''));d.appendChild(dot);}document.getElementById('plabel').textContent='';}
function updateDots(){const dots=document.querySelectorAll('.dot');dots.forEach((d,i)=>{d.className='dot';if(i<results.length)d.classList.add(results[i]);else if(i===qi)d.classList.add('cur');});const done=results.length,crt=results.filter(r=>r==='ok').length;document.getElementById('plabel').textContent=done>0?`已完成 ${done}/20 · 正確率 ${Math.round(crt/done*100)}%`:'';
}
function showBadge(n){const b=document.getElementById('badge');b.textContent=n>=10?`🔥💀 連勝${n}題！`:n>=7?`🔥🔥 神級連勝${n}！`:n>=5?`🔥 超級連勝${n}！`:`🔥 連勝${n}題！`;b.style.display='block';setTimeout(()=>b.style.display='none',2200);}
initDots();
</script>
</body>
